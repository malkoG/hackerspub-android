fragment ActorFields on Actor {
    id
    name
    handle
    avatarUrl
}

fragment MediaFields on PostMedium {
    id
    url
    thumbnailUrl
    alt
    height
    width
    type
}

fragment EngagementStatsFields on PostEngagementStats {
    replies
    reactions
    shares
    quotes
}

fragment PostFields on Post {
    __typename
    id
    name
    published
    summary
    content
    excerpt
    url
    iri
    viewerHasShared
    actor {
        ...ActorFields
    }
    media {
        ...MediaFields
    }
    link {
        title
        description
        url
        siteName
        author
        image {
            url
            alt
            width
            height
        }
        creator {
            ...ActorFields
        }
    }
    engagementStats {
        ...EngagementStatsFields
    }
    mentions(first: 20) {
        edges {
            node {
                handle
            }
        }
    }
    quotedPost {
        ...SharedPostFields
    }
    reactionGroups {
        __typename
        ... on EmojiReactionGroup {
            emoji
            reactors(first: 20) {
                totalCount
                viewerHasReacted
            }
        }
        ... on CustomEmojiReactionGroup {
            customEmoji {
                id
                name
                imageUrl
            }
            reactors(first: 20) {
                totalCount
                viewerHasReacted
            }
        }
    }
}

fragment SharedPostFields on Post {
    __typename
    id
    name
    published
    summary
    content
    excerpt
    url
    iri
    viewerHasShared
    actor {
        ...ActorFields
    }
    media {
        ...MediaFields
    }
    engagementStats {
        ...EngagementStatsFields
    }
    mentions(first: 20) {
        edges {
            node {
                handle
            }
        }
    }
}

query PublicTimeline($after: String) {
    publicTimeline(first: 20, after: $after) {
        edges {
            cursor
            node {
                ...PostFields
                sharedPost {
                    ...SharedPostFields
                }
            }
        }
        pageInfo {
            hasNextPage
            endCursor
        }
    }
}

query LocalTimeline($after: String) {
    publicTimeline(local: true, first: 20, after: $after) {
        edges {
            cursor
            node {
                ...PostFields
                sharedPost {
                    ...SharedPostFields
                }
            }
        }
        pageInfo {
            hasNextPage
            endCursor
        }
    }
}

query PersonalTimeline($after: String) {
    personalTimeline(first: 20, after: $after) {
        edges {
            cursor
            lastSharer {
                ...ActorFields
            }
            sharersCount
            node {
                ...PostFields
                visibility
                replyTarget {
                    ...PostFields
                }
                sharedPost {
                    ...SharedPostFields
                }
            }
        }
        pageInfo {
            hasNextPage
            endCursor
        }
    }
}

query Viewer {
    viewer {
        id
        username
        name
        bio
        avatarUrl
        handle
    }
}

query Notifications($after: String) {
    viewer {
        id
        notifications(first: 20, after: $after) {
            edges {
                cursor
                node {
                    __typename
                    id
                    uuid
                    created
                    actors(first: 5) {
                        edges {
                            node {
                                ...ActorFields
                            }
                        }
                    }
                    ... on FollowNotification {
                        id
                    }
                    ... on MentionNotification {
                        post {
                            id
                            content
                        }
                    }
                    ... on ReplyNotification {
                        post {
                            id
                            content
                        }
                    }
                    ... on QuoteNotification {
                        post {
                            id
                            content
                        }
                    }
                    ... on ReactNotification {
                        emoji
                        customEmoji {
                            id
                            name
                            imageUrl
                        }
                        post {
                            id
                            content
                        }
                    }
                    ... on ShareNotification {
                        post {
                            id
                            content
                        }
                    }
                }
            }
            pageInfo {
                hasNextPage
                endCursor
            }
        }
    }
}

query SearchPost($query: String!) {
    searchPost(query: $query) {
        edges {
            node {
                ...PostFields
                sharedPost {
                    ...SharedPostFields
                }
            }
        }
    }
}

query SearchObject($query: String!) {
    searchObject(query: $query) {
        ... on SearchedObject {
            url
        }
        ... on EmptySearchQueryError {
            message
        }
    }
}

query ActorByHandle($handle: String!) {
    actorByHandle(handle: $handle, allowLocalHandle: true) {
        id
        handle
        isViewer
        viewerFollows
        followsViewer
        viewerBlocks
        name
        bio
        avatarUrl
        fields {
            name
            value
        }
        account {
            links {
                name
                handle
                icon
                url
                verified
            }
        }
    }
}

query ActorPosts($handle: String!, $after: String) {
    actorByHandle(handle: $handle, allowLocalHandle: true) {
        id
        posts(first: 20, after: $after) {
            edges {
                cursor
                node {
                    ...PostFields
                    sharedPost {
                        ...SharedPostFields
                    }
                }
            }
            pageInfo {
                hasNextPage
                endCursor
            }
        }
    }
}

query ActorArticles($handle: String!, $after: String) {
